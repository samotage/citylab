# CityLab configuration

server:
  host: 127.0.0.1
  port: 15099
  debug: true

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

database:
  host: localhost
  port: 5432
  name: citylab
  user: samotage
  password: ""

redis:
  url: redis://localhost:6379/0

api:
  token: dev-token-changeme

headspace:
  url: https://smac.griffin-blenny.ts.net:5055
  api_token: ""
  # Headspace project identifier the remote agents are created under.
  project_name: city-lab
  timeout_seconds: 30
  # Available remote agent personas. Ray (NEM market analyst) is seeded as the
  # default agent via `flask seed-agents`.
  personas:
    - slug: energy-market-analyst-ray-50
      name: Ray
      role: NEM energy market analyst

session:
  lifetime_days: 30
  cookie_name: session_citylab

battery_assets:
  - name: "City BESS Alpha"
    region: VIC1
    capacity_mwh: 200
    max_power_mw: 100
    roundtrip_eff: 0.85
    min_soc_pct: 10
    max_soc_pct: 95
    reserve_soc_pct: 30
    initial_soc_pct: 50
  - name: "City BESS Beta"
    region: VIC1
    capacity_mwh: 50
    max_power_mw: 25
    roundtrip_eff: 0.90
    min_soc_pct: 5
    max_soc_pct: 95
    reserve_soc_pct: 20
    initial_soc_pct: 60

dispatch:
  discharge_threshold_aud_mwh: 150
  charge_threshold_aud_mwh: 40
  interconnector_stress_pct: 85
  solar_cloud_opacity_trigger_pct: 60
  wind_drop_trigger_pct: 30
  pre_position_soc_ceiling_pct: 70

# Data ingestion sources. Sensitive credentials are referenced via env vars
# (${VAR_NAME}) and injected into DataSource.config at seed time. New sources
# are added here and seeded via `cli-citylab data seed`.
data_sources:
  opennem:
    name: "OpenNEM VIC1"
    base_url: https://api.openelectricity.org.au/v4
    api_key: ${OPENNEM_API_KEY}
    region: VIC1
    allow_synthetic_fallback: true
    cron_expression: "*/5 * * * *"
    timeout_seconds: 8
  opennem_nsw1:
    name: "OpenNEM NSW1"
    base_url: https://api.openelectricity.org.au/v4
    api_key: ${OPENNEM_API_KEY}
    region: NSW1
    allow_synthetic_fallback: true
    cron_expression: "*/5 * * * *"
    timeout_seconds: 8
  opennem_qld1:
    name: "OpenNEM QLD1"
    base_url: https://api.openelectricity.org.au/v4
    api_key: ${OPENNEM_API_KEY}
    region: QLD1
    allow_synthetic_fallback: true
    cron_expression: "*/5 * * * *"
    timeout_seconds: 8
  opennem_sa1:
    name: "OpenNEM SA1"
    base_url: https://api.openelectricity.org.au/v4
    api_key: ${OPENNEM_API_KEY}
    region: SA1
    allow_synthetic_fallback: true
    cron_expression: "*/5 * * * *"
    timeout_seconds: 8
  opennem_tas1:
    name: "OpenNEM TAS1"
    base_url: https://api.openelectricity.org.au/v4
    api_key: ${OPENNEM_API_KEY}
    region: TAS1
    allow_synthetic_fallback: true
    cron_expression: "*/5 * * * *"
    timeout_seconds: 8
  bom:
    name: "BOM Weather Forecasts"
    base_url: https://api.weather.bom.gov.au
    # BOM public endpoints do not require a key.
    # Forecasts every 3 hours; observations fetched within the same run.
    cron_expression: "0 */3 * * *"
    timeout_seconds: 8
  solcast:
    name: "Solcast Solar Forecasts"
    base_url: https://api.solcast.com.au
    api_key: ${SOLCAST_API_KEY}
    # REAL Solcast API — no synthetic fallback. Manual/on-demand only (NOT
    # scheduled) to protect the small one-off request budget on the New User
    # Evaluation plan. Refresh with:  flask solcast-refresh
    scheduled: false
    cron_expression: "0 * * * *"   # retained for reference; ignored while scheduled:false
    timeout_seconds: 15
    period: PT30M
    output_parameters: ghi,dni,dhi,air_temp,cloud_opacity
    forecast_request_budget: 10
    live_request_budget: 10
