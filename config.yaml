# CityLab configuration

server:
  host: 127.0.0.1
  port: 5099
  debug: true

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

database:
  host: localhost
  port: 5432
  name: citylab
  user: samotage
  password: ""

redis:
  url: redis://localhost:6379/0

api:
  token: dev-token-changeme

headspace:
  url: http://127.0.0.1:5001
  api_token: ""

session:
  lifetime_days: 30
  cookie_name: session_citylab

# Data ingestion sources. Sensitive credentials are referenced via env vars
# (${VAR_NAME}) and injected into DataSource.config at seed time. New sources
# are added here and seeded via `cli-citylab data seed`.
data_sources:
  opennem:
    name: "OpenNEM Victorian NEM"
    base_url: https://api.opennem.org.au
    # OpenNEM public endpoints do not require a key; left here for future use.
    api_key: ${OPENNEM_API_KEY}
    cron_expression: "*/5 * * * *"
    timeout_seconds: 8
  bom:
    name: "BOM Weather Forecasts"
    base_url: https://api.weather.bom.gov.au
    # BOM public endpoints do not require a key.
    # Forecasts every 3 hours; observations fetched within the same run.
    cron_expression: "0 */3 * * *"
    timeout_seconds: 8
  solcast:
    name: "Solcast Solar Forecasts"
    base_url: https://api.solcast.com.au
    # Solcast requires an API key (free tier has a daily call budget).
    # Without a key the fetcher falls back to a synthetic diurnal forecast so
    # the demo always has solar data. Hourly fetch per Solcast update cadence.
    api_key: ${SOLCAST_API_KEY}
    cron_expression: "0 * * * *"
    timeout_seconds: 8
    daily_call_budget: 10
