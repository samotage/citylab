<div class="card-label">Generation Mix</div>

<div class="space-y-1.5">
    {% for label in vm.labels %}
    <div class="flex items-center gap-2.5">
        <span class="inline-block w-2.5 h-2.5 rounded-sm flex-shrink-0" style="background: {{ vm.colours[loop.index0] }};"></span>
        <span class="text-[13px] text-zinc-600 flex-1">{{ label }}</span>
        <div class="w-24 h-1.5 bg-zinc-100 rounded-full overflow-hidden flex-shrink-0">
            {% set pct = (vm.outputs[loop.index0] / vm.total_output_mw * 100) if vm.total_output_mw > 0 else 0 %}
            <div class="h-full rounded-full" style="width: {{ '%.1f' | format(pct) }}%; background: {{ vm.colours[loop.index0] }};"></div>
        </div>
        <span class="font-mono text-xs font-medium text-zinc-900 w-16 text-right flex-shrink-0">{{ '{:,.0f}'.format(vm.outputs[loop.index0]) }} <span class="text-zinc-400">MW</span></span>
    </div>
    {% endfor %}
</div>

<div class="flex items-center justify-between mt-3 pt-3 border-t border-zinc-200 text-[13px] text-zinc-500">
    <span>Total output</span>
    <span class="font-mono font-semibold text-zinc-900">{{ '{:,.0f}'.format(vm.total_output_mw) }} MW</span>
</div>
