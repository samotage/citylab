<div class="flex items-center justify-between mb-3">
    <div class="card-label mb-0">24h Price Forecast</div>
    <div class="flex items-center gap-4 text-[10px] uppercase tracking-wider text-zinc-400 font-medium">
        <span class="flex items-center gap-1.5"><span class="inline-block w-3 h-0.5 rounded" style="background:#7c3aed;"></span> forecast</span>
        <span class="flex items-center gap-1.5"><span class="inline-block w-3 h-0.5 rounded" style="background:#a1a1aa;"></span> actual</span>
    </div>
</div>

<div class="relative rounded-lg bg-zinc-100 border border-zinc-200 p-2" style="height: 200px;">
    <canvas id="forecast-chart"></canvas>
</div>

<script>
(function () {
    if (typeof Chart === "undefined") return;
    var canvas = document.getElementById("forecast-chart");
    if (!canvas) return;
    var existing = Chart.getChart(canvas);
    if (existing) existing.destroy();

    new Chart(canvas, {
        type: "line",
        data: {
            labels: {{ vm.labels | tojson }},
            datasets: [
                {
                    label: "Forecast",
                    data: {{ vm.forecast_series | tojson }},
                    borderColor: "#7c3aed",
                    backgroundColor: "rgba(124,58,237,0.08)",
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.25,
                    fill: true,
                    spanGaps: true
                },
                {
                    label: "Actual",
                    data: {{ vm.actual_series | tojson }},
                    borderColor: "#a1a1aa",
                    borderWidth: 1.5,
                    borderDash: [4, 3],
                    pointRadius: 0,
                    tension: 0.25,
                    spanGaps: true
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 300 },
            scales: {
                x: {
                    ticks: { color: "#a1a1aa", font: { family: "'JetBrains Mono', monospace", size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
                    grid: { color: "#e4e4e7" }
                },
                y: {
                    ticks: { color: "#a1a1aa", font: { family: "'JetBrains Mono', monospace", size: 10 }, callback: function (v) { return "$" + v; } },
                    grid: { color: "#e4e4e7" }
                }
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: "#09090b",
                    titleColor: "#e4e4e7",
                    bodyColor: "#e4e4e7",
                    bodyFont: { family: "'JetBrains Mono', monospace" },
                    borderColor: "#27272a",
                    borderWidth: 1,
                    cornerRadius: 8,
                    padding: 10
                }
            }
        }
    });
})();
</script>
