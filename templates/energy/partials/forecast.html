<div class="flex items-center justify-between mb-4">
    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider">Price Forecast &mdash; next 24h (pre-dispatch)</h3>
    <div class="flex items-center gap-4 text-xs text-gray-500">
        <span class="flex items-center gap-1"><span class="inline-block w-3 h-0.5" style="background:#38bdf8;"></span> forecast</span>
        <span class="flex items-center gap-1"><span class="inline-block w-3 h-0.5" style="background:#facc15;"></span> actual</span>
    </div>
</div>

<div class="relative" style="height: 220px;">
    <canvas id="forecast-chart"></canvas>
</div>

<script>
(function () {
    if (typeof Chart === "undefined") return;
    var canvas = document.getElementById("forecast-chart");
    if (!canvas) return;
    var existing = Chart.getChart(canvas);
    if (existing) existing.destroy();

    new Chart(canvas, {
        type: "line",
        data: {
            labels: {{ vm.labels | tojson }},
            datasets: [
                {
                    label: "Forecast",
                    data: {{ vm.forecast_series | tojson }},
                    borderColor: "#38bdf8",
                    backgroundColor: "rgba(56,189,248,0.1)",
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.25,
                    fill: true,
                    spanGaps: true
                },
                {
                    label: "Actual",
                    data: {{ vm.actual_series | tojson }},
                    borderColor: "#facc15",
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.25,
                    spanGaps: true
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 300 },
            scales: {
                x: {
                    ticks: { color: "#9ca3af", maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
                    grid: { color: "rgba(75,85,99,0.2)" }
                },
                y: {
                    ticks: { color: "#9ca3af", callback: function (v) { return "$" + v; } },
                    grid: { color: "rgba(75,85,99,0.2)" }
                }
            },
            plugins: { legend: { display: false } }
        }
    });
})();
</script>
