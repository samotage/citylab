<div class="flex items-center justify-between">
    <span class="text-[10px] font-medium text-zinc-400 uppercase tracking-wider">Data Sources</span>
    <div class="flex items-center gap-5">
        {% for s in vm.sources %}
        <div class="flex items-center gap-1.5">
            <span class="source-dot {% if s.ok %}source-ok{% else %}source-bad{% endif %}"></span>
            <span class="text-[11px] font-medium text-zinc-600">{{ s.label }}</span>
            <span class="text-[10px] font-mono {% if s.stale %}text-amber-600{% else %}text-zinc-400{% endif %}">
                {% if s.last_fetch_local %}
                    {{ s.last_fetch_local }}{% if s.stale %} (stale){% endif %}
                {% else %}
                    never
                {% endif %}
            </span>
        </div>
        {% endfor %}
    </div>
</div>
