<div class="flex items-center justify-between">
    <h3 class="text-xs font-medium text-gray-500 uppercase tracking-wider">Data Sources</h3>
    <div class="flex items-center gap-6">
        {% for s in vm.sources %}
        <div class="flex items-center gap-2">
            <span class="source-dot {% if s.ok %}source-ok{% else %}source-bad{% endif %}"></span>
            <span class="text-sm text-gray-300">{{ s.label }}</span>
            <span class="text-xs {% if s.stale %}text-amber-400{% else %}text-gray-500{% endif %}">
                {% if s.last_fetch_local %}
                    {{ s.last_fetch_local }}{% if s.stale %} (stale){% endif %}
                {% else %}
                    never
                {% endif %}
            </span>
        </div>
        {% endfor %}
    </div>
</div>
