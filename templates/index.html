{% extends "base.html" %}
{% block title %}Dashboard — CityLab{% endblock %}

{% block content %}
<div>
    <h2 class="text-xl font-bold text-zinc-900 mb-6">Dashboard</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="card">
            <h3 class="card-label">App Status</h3>
            <div id="app-status" hx-get="/health" hx-trigger="load, every 30s" hx-swap="innerHTML">
                <div class="text-zinc-400 text-sm">Loading...</div>
            </div>
        </div>

        <div class="card">
            <h3 class="card-label">Scheduled Tasks</h3>
            <p class="text-zinc-500 text-sm">Manage via CLI: <code class="font-mono text-volt-600 text-xs">cli-citylab schedules list</code></p>
        </div>

        <div class="card">
            <h3 class="card-label">Quick Start</h3>
            <p class="text-zinc-500 text-sm">CityLab is running. Use the CLI or API to manage agent operations.</p>
        </div>
    </div>
</div>
{% endblock %}
